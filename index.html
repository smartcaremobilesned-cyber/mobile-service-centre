<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Mobile Service Centre</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #555; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #667eea; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { opacity: 0.9; }
        .error { color: #dc3545; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🏪 Mobile Service Centre</h1>
        <h2 style="text-align: center; color: #666; font-size: 16px; margin-bottom: 30px;">Login to Continue</h2>
        
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required autocomplete="current-password">
            </div>
            
            <button type="submit">Login</button>
            <p class="error" id="errorMsg">Invalid username or password!</p>
        </form>
        
        <p style="margin-top: 20px; text-align: center; color: #999; font-size: 12px;">
            Default: admin / Support@123
        </p>
    </div>

    <script>
        const users = {
            'admin': { password: 'Support@123', role: 'admin' },
            'employee': { password: 'emp123', role: 'employee' }
        };

        function handleLogin(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (users[username] && users[username].password === password) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', username);
                localStorage.setItem('userRole', users[username].role);
                localStorage.setItem('loginTime', new Date().toISOString());
                window.location.href = 'app.html';
            } else {
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
